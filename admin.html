<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Message Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #12121f 100%);
            color: #f8fafc;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .btn-logout {
            background: linear-gradient(90deg, #7c3aed, #06b6d4);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(124, 58, 237, 0.3);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(30, 30, 46, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            border-color: rgba(124, 58, 237, 0.5);
            transform: translateY(-5px);
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #7c3aed;
        }
        
        .stat-label {
            color: #94a3b8;
            margin-top: 5px;
        }
        
        .messages-container {
            background: rgba(30, 30, 46, 0.6);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .messages-container h2 {
            margin-bottom: 20px;
            color: #f8fafc;
        }
        
        .message-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .message-card:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(124, 58, 237, 0.3);
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .message-name {
            font-weight: bold;
            color: #a78bfa;
        }
        
        .message-email {
            color: #06b6d4;
        }
        
        .message-date {
            color: #94a3b8;
            font-size: 0.85rem;
        }
        
        .message-content {
            color: #cbd5e1;
            line-height: 1.6;
            margin-top: 10px;
            word-wrap: break-word;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        
        .badge {
            background: #ef4444;
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.75rem;
            margin-left: 10px;
        }
        
        @media (max-width: 768px) {
            .stats {
                grid-template-columns: 1fr;
            }
            .message-header {
                flex-direction: column;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-envelope"></i> Message Dashboard</h1>
            <button onclick="logout()" class="btn-logout">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="total-count">0</div>
                <div class="stat-label">Total Messages</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="unread-count">0</div>
                <div class="stat-label">Unread</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="today-count">0</div>
                <div class="stat-label">Today</div>
            </div>
        </div>

        <div class="messages-container">
            <h2><i class="fas fa-list"></i> All Messages</h2>
            <div id="messages-list" class="messages-list">
                <div class="loading">Loading messages...</div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rvmyhkrqghcuimktiazn.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_85UDpgCUl3-fiZc96Mf0ag_81EZKWYA';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Check authentication (simple password protection)
        function checkAuth() {
            const auth = sessionStorage.getItem('admin_auth');
            if (!auth) {
                const password = prompt('Enter admin password:');
                if (password === 'admin123') { // Replace with your desired password
                    sessionStorage.setItem('admin_auth', 'true');
                } else {
                    window.location.href = 'index.html';
                }
            }
        }

        async function loadMessages() {
            const {
                data: messages,
                error
            } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', {
                    ascending: false
                });

            if (error) {
                console.error('Error loading messages:', error);
                document.getElementById('messages-list').innerHTML =
                    '<div class="loading">Error loading messages. Please try again.</div>';
                return;
            }

            if (messages && messages.length > 0) {
                displayMessages(messages);
                updateStats(messages);
            } else {
                document.getElementById('messages-list').innerHTML =
                    '<div class="loading">No messages yet. Check back later!</div>';
            }
        }

        function displayMessages(messages) {
            const container = document.getElementById('messages-list');
            container.innerHTML = '';

            messages.forEach(message => {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message-card';
                messageDiv.innerHTML = `
                    <div class="message-header">
                        <div>
                            <span class="message-name"><i class="fas fa-user"></i> ${escapeHtml(message.name)}</span>
                            <span class="message-email"><i class="fas fa-envelope"></i> ${escapeHtml(message.email)}</span>
                        </div>
                        <div class="message-date">
                            <i class="fas fa-clock"></i> ${new Date(message.created_at).toLocaleString()}
                        </div>
                    </div>
                    <div class="message-content">
                        ${escapeHtml(message.message)}
                    </div>
                `;
                container.appendChild(messageDiv);
            });
        }

        async function updateStats(messages) {
            document.getElementById('total-count').textContent = messages.length;

            const unread = messages.filter(m => !m.is_read).length;
            document.getElementById('unread-count').textContent = unread;

            const today = new Date().toDateString();
            const todayMessages = messages.filter(m =>
                new Date(m.created_at).toDateString() === today
            ).length;
            document.getElementById('today-count').textContent = todayMessages;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function logout() {
            sessionStorage.removeItem('admin_auth');
            window.location.href = 'index.html';
        }

        // Real-time subscription
        const subscription = supabase
            .channel('messages-channel')
            .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages'
                },
                (payload) => {
                    console.log('New message received!');
                    loadMessages(); // Reload messages
                }
            )
            .subscribe();

        // Initialize
        checkAuth();
        loadMessages();
    </script>
</body>

</html>

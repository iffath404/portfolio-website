name: CI/CD Pipeline for Portfolio

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Global environment variables
env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Test Supabase Connection
  test-supabase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Test Supabase Connection
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "⚠️ Warning: Supabase secrets not configured. Skipping connection test."
            exit 0
          fi
          npm init -y
          npm install @supabase/supabase-js
          node -e "
          const { createClient } = require('@supabase/supabase-js');
          const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_ANON_KEY);
          
          async function checkConn() {
            try {
              const { count, error } = await supabase.from('messages').select('*', { count: 'exact', head: true });
              if (error) {
                console.error('❌ Connection failed:', error.message);
                process.exit(1);
              }
              console.log('✅ Supabase connected! Total messages:', count);
              process.exit(0);
            } catch (err) {
              console.error('❌ Error:', err.message);
              process.exit(1);
            }
          }
          checkConn();
          "
  
  # Validate HTML with Supabase integration
  validate:
    runs-on: ubuntu-latest
    needs: test-supabase
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for Supabase API keys
        run: |
          if grep -q "SUPABASE_URL" index.html; then
            echo "⚠️ Warning: Hardcoded Supabase URL detected in HTML"
          fi
          
          if grep -q "sb_publishable_85UDpgCUl3-fiZc96Mf0ag_81EZKWYA" index.html; then
            echo "❌ Error: Placeholder Supabase key found!"
            exit 1
          fi
      
      - name: Validate HTML structure
        run: |
          npm install -g htmlhint
          htmlhint index.html || true
  
  # Build and Deploy
  deploy:
    runs-on: ubuntu-latest
    needs: [test-supabase, validate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Replace Supabase credentials
        run: |
          # Replace placeholder with actual credentials from secrets
          sed -i "s|https://rvmyhkrqghcuimktiazn.supabase.co|${{ secrets.SUPABASE_URL }}|g" index.html
          sed -i "s|sb_publishable_85UDpgCUl3-fiZc96Mf0ag_81EZKWYA|${{ secrets.SUPABASE_ANON_KEY }}|g" index.html
          sed -i "s|admin123|${{ secrets.ADMIN_PASSWORD }}|g" admin.html 2>/dev/null || true
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Send deployment notification
        if: success()
        run: |
          echo "✅ Portfolio with Supabase backend deployed!"
          echo "🌐 Live at: ${{ steps.deployment.outputs.page_url }}"
